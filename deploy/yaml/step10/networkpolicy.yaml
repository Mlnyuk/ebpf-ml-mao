apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ebpf-ml-mao-default-deny
  namespace: ebpf-obs
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ebpf-ml-mao-analyzer-ingress
  namespace: ebpf-obs
spec:
  podSelector:
    matchLabels:
      app: ebpf-ml-mao-analyzer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ebpf-ml-mao-collector
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ebpf-ml-mao-collector-egress
  namespace: ebpf-obs
spec:
  podSelector:
    matchLabels:
      app: ebpf-ml-mao-collector
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ebpf-ml-mao-analyzer
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090
