apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-ml-mao-collector
  namespace: ebpf-obs
spec:
  template:
    spec:
      containers:
        - name: collector
          image: ghcr.io/mlnyuk/ebpf-ml-mao:step10
          args:
            - >-
              mkdir -p ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME} /tmp &&
              while true; do
                PYTHONPATH=/app/app python3 -m ebpf_ml_mao phase3
                --baseline-tetragon ${BASELINE_TETRAGON_PATH}
                --baseline-prometheus ${BASELINE_PROMETHEUS_PATH}
                --tetragon-log ${TETRAGON_LOG_PATH}
                --prometheus-url ${PROMETHEUS_URL}
                --output-dir ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME} &&
                PYTHONPATH=/app/app python3 -m ebpf_ml_mao push-report
                --api-url ${ANALYZER_API_URL}
                --node-name ${NODE_NAME}
                --report-path ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME}/report.json
                --shared-token ${ANALYZER_SHARED_TOKEN};
                sleep ${ANALYSIS_INTERVAL_SECONDS};
              done
          envFrom:
            - configMapRef:
                name: ebpf-ml-mao-runtime
            - secretRef:
                name: ebpf-ml-mao-secret
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f ${TETRAGON_LOG_PATH}
            initialDelaySeconds: 5
            periodSeconds: 15
