---
apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-obs

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-agent
  namespace: ebpf-obs

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ebpf-agent
subjects:
  - kind: ServiceAccount
    name: ebpf-agent
    namespace: ebpf-obs

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-agent
  namespace: ebpf-obs
spec:
  selector:
    matchLabels:
      app: ebpf-agent
  template:
    metadata:
      labels:
        app: ebpf-agent
    spec:
      serviceAccountName: ebpf-agent
      hostPID: true
      hostNetwork: true
      containers:
        - name: ebpf-agent
          image: ubuntu:22.04
          command: ["sleep", "infinity"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: sys
              mountPath: /sys
            - name: proc
              mountPath: /proc
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: modules
              mountPath: /lib/modules
            - name: usrsrc
              mountPath: /usr/src
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
        - name: modules
          hostPath:
            path: /lib/modules
        - name: usrsrc
          hostPath:
            path: /usr/src
