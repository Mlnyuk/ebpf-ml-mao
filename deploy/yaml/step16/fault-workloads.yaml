apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-obs-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fault-target
  namespace: ebpf-obs-test
  labels:
    app: fault-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fault-target
  template:
    metadata:
      labels:
        app: fault-target
    spec:
      containers:
        - name: fault-target
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do sleep 3600; done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
