apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
spec:
  template:
    spec:
      containers:
        - name: analyzer
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
