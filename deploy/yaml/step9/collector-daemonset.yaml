apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-ml-mao-collector
  namespace: ebpf-obs
spec:
  selector:
    matchLabels:
      app: ebpf-ml-mao-collector
  template:
    metadata:
      labels:
        app: ebpf-ml-mao-collector
    spec:
      serviceAccountName: ebpf-ml-mao-collector
      containers:
        - name: collector
          image: ghcr.io/mlnyuk/ebpf-ml-mao:step9
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - >-
              mkdir -p ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME} /tmp &&
              while true; do
                PYTHONPATH=/app python3 -m ebpf_ml_mao phase3
                --baseline-tetragon ${BASELINE_TETRAGON_PATH}
                --baseline-prometheus ${BASELINE_PROMETHEUS_PATH}
                --tetragon-log ${TETRAGON_LOG_PATH}
                --prometheus-url ${PROMETHEUS_URL}
                --output-dir ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME};
                sleep ${ANALYSIS_INTERVAL_SECONDS};
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: ebpf-ml-mao-runtime
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
          volumeMounts:
            - name: tetragon-run
              mountPath: /var/run/cilium/tetragon
              readOnly: true
            - name: collector-state
              mountPath: /var/lib/ebpf-ml-mao-collector
            - name: tmp
              mountPath: /tmp
        - name: report-shipper
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - >-
              while true; do
                find /var/lib/ebpf-ml-mao-collector/reports -type f | sort | tail -n 5;
                sleep 60;
              done
          volumeMounts:
            - name: collector-state
              mountPath: /var/lib/ebpf-ml-mao-collector
      volumes:
        - name: tetragon-run
          hostPath:
            path: /var/run/cilium/tetragon
            type: DirectoryOrCreate
        - name: collector-state
          hostPath:
            path: /var/lib/ebpf-ml-mao-collector
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
