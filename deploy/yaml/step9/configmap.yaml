apiVersion: v1
kind: ConfigMap
metadata:
  name: ebpf-ml-mao-runtime
  namespace: ebpf-obs
data:
  PROMETHEUS_URL: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/metrics
  TETRAGON_LOG_PATH: /var/run/cilium/tetragon/tetragon.log
  REGISTRY_PATH: /var/lib/ebpf-ml-mao/registry/registry.json
  MODEL_DIR: /var/lib/ebpf-ml-mao/models
  REPORT_DIR: /var/lib/ebpf-ml-mao/reports
  COLLECTOR_OUTPUT_DIR: /var/lib/ebpf-ml-mao-collector/reports
  BASELINE_TETRAGON_PATH: /app/samples/step2/baseline_tetragon.jsonl
  BASELINE_PROMETHEUS_PATH: /app/samples/step2/baseline_prometheus.json
  SCRAPE_TIMEOUT: "5.0"
  TETRAGON_TAIL_LINES: "200"
  ANALYSIS_INTERVAL_SECONDS: "30"
