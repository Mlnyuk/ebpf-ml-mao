## TracingPolicy 모음
## kubectl apply -f tetragon-tracingpolicy.yaml

---
# 1. 프로세스 실행 모니터링
#    모든 execve 호출을 추적 (컨테이너 내 명령어 실행 감지)
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-exec
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"  # 실행 파일 경로
        - index: 1
          type: "char_buf"  # 인자 목록 (argv[0])

---
# 2. 네트워크 연결 모니터링
#    TCP connect 추적 (Pod 간 또는 외부 연결 감지)
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-tcp-connect
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"  # 소켓 정보 (src/dst IP, port 자동 추출)

---
# 3. 민감 파일 접근 모니터링
#    /etc/passwd, /etc/shadow, /proc/*/mem 접근 감지
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-sensitive-files
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/passwd"
                - "/etc/shadow"
                - "/root/.ssh"
                - "/proc"

---
# 4. 권한 상승 감지
#    setuid / setgid 호출 추적
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-privilege-escalation
spec:
  kprobes:
    - call: "sys_setuid"
      syscall: true
      args:
        - index: 0
          type: "int"
    - call: "sys_setgid"
      syscall: true
      args:
        - index: 0
          type: "int"
