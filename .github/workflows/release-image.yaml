name: release-image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: step14

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mlnyuk/ebpf-ml-mao:${{ inputs.image_tag }}
      - name: Render Step 14 manifests
        run: kubectl kustomize deploy/yaml/step14 > step14-rendered.yaml
      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: step14-rendered
          path: step14-rendered.yaml
