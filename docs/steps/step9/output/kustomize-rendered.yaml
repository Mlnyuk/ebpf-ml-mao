apiVersion: v1
kind: Namespace
metadata:
  name: ebpf-obs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-ml-mao-collector
  namespace: ebpf-obs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-ml-mao-collector
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - nodes
  - namespaces
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ebpf-ml-mao-analyzer
subjects:
- kind: ServiceAccount
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-ml-mao-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ebpf-ml-mao-collector
subjects:
- kind: ServiceAccount
  name: ebpf-ml-mao-collector
  namespace: ebpf-obs
---
apiVersion: v1
data:
  ANALYSIS_INTERVAL_SECONDS: "30"
  BASELINE_PROMETHEUS_PATH: /app/samples/step2/baseline_prometheus.json
  BASELINE_TETRAGON_PATH: /app/samples/step2/baseline_tetragon.jsonl
  COLLECTOR_OUTPUT_DIR: /var/lib/ebpf-ml-mao-collector/reports
  MODEL_DIR: /var/lib/ebpf-ml-mao/models
  PROMETHEUS_URL: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/metrics
  REGISTRY_PATH: /var/lib/ebpf-ml-mao/registry/registry.json
  REPORT_DIR: /var/lib/ebpf-ml-mao/reports
  SCRAPE_TIMEOUT: "5.0"
  TETRAGON_LOG_PATH: /var/run/cilium/tetragon/tetragon.log
  TETRAGON_TAIL_LINES: "200"
kind: ConfigMap
metadata:
  name: ebpf-ml-mao-runtime
  namespace: ebpf-obs
---
apiVersion: v1
kind: Service
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: ebpf-ml-mao-analyzer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebpf-ml-mao-state
  namespace: ebpf-obs
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebpf-ml-mao-analyzer
  namespace: ebpf-obs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ebpf-ml-mao-analyzer
  template:
    metadata:
      labels:
        app: ebpf-ml-mao-analyzer
    spec:
      containers:
      - args:
        - mkdir -p ${MODEL_DIR} ${REPORT_DIR} $(dirname ${REGISTRY_PATH}) && PYTHONPATH=/app
          python3 -m ebpf_ml_mao registry status --registry-path ${REGISTRY_PATH}
          || true && sleep infinity
        command:
        - /bin/sh
        - -c
        envFrom:
        - configMapRef:
            name: ebpf-ml-mao-runtime
        image: ghcr.io/mlnyuk/ebpf-ml-mao:step9
        imagePullPolicy: IfNotPresent
        name: analyzer
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f ${REGISTRY_PATH} || test -d ${MODEL_DIR}
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
        volumeMounts:
        - mountPath: /var/lib/ebpf-ml-mao
          name: state
        - mountPath: /tmp
          name: tmp
      serviceAccountName: ebpf-ml-mao-analyzer
      volumes:
      - name: state
        persistentVolumeClaim:
          claimName: ebpf-ml-mao-state
      - emptyDir: {}
        name: tmp
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-ml-mao-collector
  namespace: ebpf-obs
spec:
  selector:
    matchLabels:
      app: ebpf-ml-mao-collector
  template:
    metadata:
      labels:
        app: ebpf-ml-mao-collector
    spec:
      containers:
      - args:
        - |-
          mkdir -p ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME} /tmp && while true; do

            PYTHONPATH=/app python3 -m ebpf_ml_mao phase3
            --baseline-tetragon ${BASELINE_TETRAGON_PATH}
            --baseline-prometheus ${BASELINE_PROMETHEUS_PATH}
            --tetragon-log ${TETRAGON_LOG_PATH}
            --prometheus-url ${PROMETHEUS_URL}
            --output-dir ${COLLECTOR_OUTPUT_DIR}/${NODE_NAME};
            sleep ${ANALYSIS_INTERVAL_SECONDS};
          done
        command:
        - /bin/sh
        - -c
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        envFrom:
        - configMapRef:
            name: ebpf-ml-mao-runtime
        image: ghcr.io/mlnyuk/ebpf-ml-mao:step9
        imagePullPolicy: IfNotPresent
        name: collector
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
        volumeMounts:
        - mountPath: /var/run/cilium/tetragon
          name: tetragon-run
          readOnly: true
        - mountPath: /var/lib/ebpf-ml-mao-collector
          name: collector-state
        - mountPath: /tmp
          name: tmp
      - args:
        - |-
          while true; do

            find /var/lib/ebpf-ml-mao-collector/reports -type f | sort | tail -n 5;
            sleep 60;
          done
        command:
        - /bin/sh
        - -c
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: report-shipper
        volumeMounts:
        - mountPath: /var/lib/ebpf-ml-mao-collector
          name: collector-state
      serviceAccountName: ebpf-ml-mao-collector
      volumes:
      - hostPath:
          path: /var/run/cilium/tetragon
          type: DirectoryOrCreate
        name: tetragon-run
      - hostPath:
          path: /var/lib/ebpf-ml-mao-collector
          type: DirectoryOrCreate
        name: collector-state
      - emptyDir: {}
        name: tmp
